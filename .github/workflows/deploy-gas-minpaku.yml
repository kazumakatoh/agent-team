name: Deploy GAS - 民泊管理

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '11_minpaku/gas/**'
      - '.github/scripts/**'
      - '.github/workflows/deploy-gas-minpaku.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必須

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auth to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/651587874344/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'gas-deployer@level1-gas-deploy.iam.gserviceaccount.com'

      - name: Install googleapis
        working-directory: .github/scripts
        run: npm install

      - name: Deploy to GAS
        env:
          SOURCE_DIR: 11_minpaku/gas
        run: node .github/scripts/deploy-gas.js
