name: Deploy GAS - 民泊管理

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '11_minpaku/gas/**'
      - '.github/scripts/**'
      - '.github/workflows/deploy-gas-minpaku.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auth to Google Cloud (Service Account)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install googleapis
        working-directory: .github/scripts
        run: npm install

      - name: Deploy to GAS
        env:
          SOURCE_DIR: 11_minpaku/gas
        run: node .github/scripts/deploy-gas.js
