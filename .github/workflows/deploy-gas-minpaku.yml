name: Deploy GAS - 民泊管理

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '11_minpaku/gas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS
        working-directory: 11_minpaku/gas
        run: clasp push --force
